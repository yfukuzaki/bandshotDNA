<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNAゲル撮影アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-gray-900 text-white p-4">
    
    <h1 class="text-lg font-bold mb-4">リアカメラ起動テスト</h1>
    <div id="status" class="mb-4 text-yellow-400 font-bold">起動準備中...</div>
    
    <!-- 映像表示用のvideo要素 -->
    <video id="video" autoplay playsinline muted class="w-full max-w-md bg-black border-4 border-gray-600 rounded-lg"></video>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');

        async function startCamera() {
            try {
                // 解像度指定を最小限にし、リアカメラをidealで要求
                const constraints = {
                    video: {
                        facingMode: { ideal: "environment" }
                    }
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                // ストリームをセット
                video.srcObject = stream;
                
                // Android/Pixel対応：play()はPromiseを返すため確実に待機する
                video.onloadedmetadata = async () => {
                    try {
                        await video.play();
                        status.innerText = "リアカメラ起動成功！映像を表示中...";
                    } catch (playError) {
                        status.innerText = "再生エラー (クリックしてください)";
                        // 自動再生がブロックされた場合の対策
                        document.body.addEventListener('click', () => {
                            video.play();
                            status.innerText = "リアカメラ起動成功！";
                        }, { once: true });
                    }
                };
            } catch (err) {
                status.innerText = "エラー: " + err.name + " - " + err.message;
            }
        }

        window.onload = startCamera;
    </script>
</body>
</html>
