<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゲル撮影専用アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <h1 class="text-xl font-bold mb-4">ゲル撮影アプリ</h1>
    
    <!-- ガイド枠を表示するコンテナ -->
    <div id="captureArea" class="border-4 border-dashed border-green-500 w-full max-w-sm aspect-square flex flex-col items-center justify-center mb-6 bg-black/50">
        <p id="status" class="text-green-400">真上から撮影してください</p>
        <img id="preview" class="hidden w-full h-full object-contain" alt="撮影プレビュー">
    </div>

    <!-- カメラ起動ボタン -->
    <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">
    <button id="captureBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-full font-bold shadow-lg">
        カメラを起動して撮影
    </button>

    <script>
        const cameraInput = document.getElementById('cameraInput');
        const captureBtn = document.getElementById('captureBtn');
        const preview = document.getElementById('preview');
        const status = document.getElementById('status');

        // ボタンクリックでファイル入力（カメラ）を誘発
        captureBtn.addEventListener('click', () => {
            cameraInput.click();
        });

        // 撮影完了時の処理
        cameraInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    status.classList.add('hidden');
                    console.log("撮影成功: 画像を取得しました");
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
