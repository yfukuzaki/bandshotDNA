<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ゲル撮影・解析ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .canvas-container { position: relative; width: 100%; max-width: 800px; margin: 0 auto; }
        canvas { border-radius: 0.5rem; background-color: #1e293b; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); width: 100%; height: auto; display: block; }
        .chart-canvas { width: 100%; height: 120px; background-color: #1e293b; border-radius: 0.25rem; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <h1 class="text-3xl font-bold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
        ゲル撮影・解析ツール (No OpenCV)
    </h1>

    <div class="w-full max-w-[800px] bg-slate-800 p-6 rounded-xl shadow-xl mb-6 flex flex-col gap-4">
        <div class="flex flex-col sm:flex-row gap-4 items-center justify-center">
            <label class="flex-1 w-full flex items-center justify-center px-4 py-3 bg-blue-600 text-white rounded-lg shadow-lg tracking-wide uppercase border border-blue-500 cursor-pointer hover:bg-blue-500 transition ease-in duration-200">
                <svg class="w-6 h-6 mr-2" fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                    <path d="M16.88 9.1A4 4 0 0 1 16 17H5a5 5 0 0 1-1-9.9V7a3 3 0 0 1 4.52-2.59A4.98 4.98 0 0 1 17 8c0 .38-.04.74-.12 1.1z" />
                </svg>
                <span class="font-bold">画像を選択 / カメラ撮影</span>
                <input type='file' id="fileInput" class="hidden" accept="image/*" capture="environment" />
            </label>
        </div>
    </div>

    <div class="w-full max-w-[800px] flex flex-col gap-4 mb-6">
        <div class="canvas-container" id="canvasContainer">
            <canvas id="canvas" width="800" height="600"></canvas>
        </div>

        <!-- Step 1: 傾き調整UI (初期は非表示) -->
        <div id="rotationControls" class="bg-slate-800 border border-slate-700 p-4 rounded-lg shadow-lg hidden flex-col gap-3 items-center">
            <label for="rotationSlider" class="text-sm text-slate-300 font-semibold">画像の傾き微調整 (ドラッグ中はグリッドを表示)</label>
            <div class="flex items-center gap-3 w-full max-w-md">
                <span class="text-xs text-slate-400">-45°</span>
                <input type="range" id="rotationSlider" min="-45" max="45" value="0" step="0.5" class="w-full accent-blue-500">
                <span class="text-xs text-slate-400">+45°</span>
            </div>
            <button id="applyCropBtn" class="mt-2 bg-blue-600 hover:bg-blue-500 text-white transition px-4 py-2 rounded-md font-bold text-sm w-full max-w-md">
                Step 1: この傾きで確定してクロップ
            </button>
        </div>

        <!-- Step 2: 解析実行ボタンとリセットボタンを含むコンテナ (初期は非表示) -->
        <div id="actionButtonsContainer" class="hidden flex flex-col sm:flex-row gap-4 w-full">
            <button id="analyzeBtn" class="flex-1 bg-green-600 hover:bg-green-500 transition px-6 py-3 rounded-lg font-bold shadow-lg flex items-center justify-center gap-2">
                Step 2: レーン解析を実行
            </button>
            <button id="resetCropBtn" class="flex-1 bg-slate-600 hover:bg-slate-500 transition px-4 py-3 rounded-lg font-bold shadow-lg flex items-center justify-center gap-2">
                元の画像に戻す
            </button>
        </div>
    </div>

    <div id="resultsContainer" class="w-full max-w-[800px] hidden flex-col gap-4 mb-12">
        <h2 class="text-xl font-bold text-emerald-400 border-b border-slate-700 pb-2">解析結果：レーン別濃度プロファイル</h2>
        <div id="laneCharts" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const rotationControls = document.getElementById('rotationControls');
        const rotationSlider = document.getElementById('rotationSlider');
        const applyCropBtn = document.getElementById('applyCropBtn');
        const actionButtonsContainer = document.getElementById('actionButtonsContainer');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const resetCropBtn = document.getElementById('resetCropBtn');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        const resultsContainer = document.getElementById('resultsContainer');
        const laneCharts = document.getElementById('laneCharts');

        let originalImage = null; // 選択された直後の元画像 (Image Object)
        let currentImage = null;  // クロップ後、解析対象となる画像 (Data URL)
        let originalFile = null;  // リセット用に元のFileオブジェクトを保持

        // 画像の読み込みとUIリセット
        function loadImageAndReset(file) {
            const img = new Image();
            img.onload = () => {
                const maxWidth = 800;
                const scale = Math.min(1, maxWidth / img.width);
                
                originalImage = new Image();
                
                // 初期のキャンバスサイズを設定して描画
                canvas.width = img.width * scale;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // 高画質な基準画像として保存
                originalImage.src = canvas.toDataURL('image/png');
                
                originalImage.onload = () => {
                    // UIの状態をリセット
                    rotationControls.classList.remove('hidden');
                    rotationControls.classList.add('flex');
                    actionButtonsContainer.classList.add('hidden');
                    actionButtonsContainer.classList.remove('flex');
                    resultsContainer.classList.add('hidden');
                    
                    rotationSlider.value = 0;
                    drawRotatedImage(0, false);
                };
            };
            img.src = URL.createObjectURL(file);
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            originalFile = file;
            loadImageAndReset(file);
        });

        resetCropBtn.addEventListener('click', () => {
            if (originalFile) loadImageAndReset(originalFile);
        });

        // 画像を回転して描画し、必要に応じてグリッドを重ねる関数
        function drawRotatedImage(angleDegree, showGrid = false) {
            if (!originalImage) return;

            const angleRad = angleDegree * Math.PI / 180;
            
            // 回転後のバウンディングボックスサイズを計算してキャンバスをリサイズ
            const w = originalImage.width;
            const h = originalImage.height;
            const cos = Math.abs(Math.cos(angleRad));
            const sin = Math.abs(Math.sin(angleRad));
            const newW = w * cos + h * sin;
            const newH = w * sin + h * cos;

            canvas.width = newW;
            canvas.height = newH;

            // 中心を基準に回転して描画
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(newW / 2, newH / 2);
            ctx.rotate(angleRad);
            ctx.drawImage(originalImage, -w / 2, -h / 2, w, h);
            ctx.restore();

            // グリッドの描画
            if (showGrid) {
                ctx.save();
                ctx.strokeStyle = 'rgba(6, 182, 212, 0.6)'; // Tailwind cyan-500 半透明
                
                // 垂直線
                const numCols = 10;
                for (let i = 1; i < numCols; i++) {
                    const x = (canvas.width / numCols) * i;
                    ctx.lineWidth = (i === numCols / 2) ? 2 : 1; // 中央は太く
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvas.height);
                    ctx.stroke();
                }

                // 水平線
                const numRows = 10;
                for (let i = 1; i < numRows; i++) {
                    const y = (canvas.height / numRows) * i;
                    ctx.lineWidth = (i === numRows / 2) ? 2 : 1; // 中央は太く
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        // スライダー操作イベント（ドラッグ中のみグリッド表示）
        rotationSlider.addEventListener('input', (e) => {
            drawRotatedImage(parseFloat(e.target.value), true);
        });
        
        const showGridEvents = ['mousedown', 'touchstart'];
        const hideGridEvents = ['mouseup', 'touchend', 'mouseleave'];

        showGridEvents.forEach(evt => {
            rotationSlider.addEventListener(evt, (e) => {
                drawRotatedImage(parseFloat(rotationSlider.value), true);
            });
        });

        hideGridEvents.forEach(evt => {
            rotationSlider.addEventListener(evt, (e) => {
                drawRotatedImage(parseFloat(rotationSlider.value), false);
            });
        });

        // 大津の二値化閾値計算
        function getOtsuThreshold(data, w, h) {
            let histogram = new Array(256).fill(0);
            for (let i = 0; i < data.length; i += 4) {
                let brightness = Math.floor(0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2]);
                histogram[brightness]++;
            }

            let total = w * h;
            let sum = 0;
            for (let i = 0; i < 256; i++) sum += i * histogram[i];

            let sumB = 0;
            let wB = 0;
            let wF = 0;
            let varMax = 0;
            let threshold = 0;

            for (let i = 0; i < 256; i++) {
                wB += histogram[i];
                if (wB === 0) continue;
                wF = total - wB;
                if (wF === 0) break;

                sumB += i * histogram[i];
                let mB = sumB / wB;
                let mF = (sum - sumB) / wF;

                let varBetween = wB * wF * (mB - mF) * (mB - mF);
                if (varBetween > varMax) {
                    varMax = varBetween;
                    threshold = i;
                }
            }
            return threshold;
        }

        // バウンディングボックスの計算（ノイズ除去付き）
        function getBoundingBox(data, w, h, threshold) {
            let minX = w, minY = h, maxX = 0, maxY = 0;
            
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    let i = (y * w + x) * 4;
                    let brightness = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                    
                    if (brightness > threshold) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                }
            }
            
            // 余白を少し持たせる
            const padding = 10;
            return {
                minX: Math.max(0, minX - padding),
                minY: Math.max(0, minY - padding),
                maxX: Math.min(w, maxX + padding),
                maxY: Math.min(h, maxY + padding)
            };
        }

        // クロップ確定ボタン
        applyCropBtn.addEventListener('click', () => {
            if (!originalImage) return;

            const w = canvas.width;
            const h = canvas.height;
            const imgData = ctx.getImageData(0, 0, w, h);
            
            const threshold = getOtsuThreshold(imgData.data, w, h);
            const bbox = getBoundingBox(imgData.data, w, h, threshold);
            
            const cropW = bbox.maxX - bbox.minX;
            const cropH = bbox.maxY - bbox.minY;

            if (cropW <= 0 || cropH <= 0) {
                // 有効な領域が見つからない場合はスキップ
                alert("有効な領域が見つかりませんでした。");
                return;
            }

            const croppedCanvas = document.createElement('canvas');
            croppedCanvas.width = cropW;
            croppedCanvas.height = cropH;
            croppedCanvas.getContext('2d').drawImage(canvas, bbox.minX, bbox.minY, cropW, cropH, 0, 0, cropW, cropH);

            canvas.width = cropW;
            canvas.height = cropH;
            ctx.drawImage(croppedCanvas, 0, 0);

            currentImage = canvas.toDataURL('image/png');

            rotationControls.classList.add('hidden');
            rotationControls.classList.remove('flex');
            actionButtonsContainer.classList.remove('hidden');
            actionButtonsContainer.classList.add('flex');
        });

        // 解析ボタンの処理
        analyzeBtn.addEventListener('click', () => {
            if (!currentImage) return;

            const w = canvas.width;
            const h = canvas.height;
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;

            // 二値化のための閾値
            const threshold = getOtsuThreshold(data, w, h);
            
            // 背景が白か黒か判定 (簡易的: 四隅の明るさで判断)
            let cornersBrightness = 0;
            const corners = [0, w-1, (h-1)*w, (h-1)*w + w-1];
            corners.forEach(idx => {
                let i = idx * 4;
                cornersBrightness += (0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2]);
            });
            const isBgBright = (cornersBrightness / 4) > threshold;

            // X軸方向への射影（縦の列ごとの明るさ合計）
            const colSums = new Array(w).fill(0);

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    let i = (y * w + x) * 4;
                    let brightness = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                    
                    // 背景が明るい場合は反転させる（バンドを値として高くする）
                    let val = isBgBright ? (255 - brightness) : brightness;
                    
                    // 閾値を超えたピクセルのみ加算（ノイズ除去）
                    if (val > (isBgBright ? 255 - threshold : threshold)) {
                        colSums[x] += val;
                    }
                }
            }

            // レーン境界の検出（谷間を探す）
            const maxColSum = Math.max(...colSums);
            const gapThreshold = maxColSum * 0.15; // 最大ピークの15%未満を隙間とみなす
            
            let inLane = false;
            let lanes = [];
            let currentLaneStart = 0;

            for (let x = 0; x < w; x++) {
                if (colSums[x] > gapThreshold) {
                    if (!inLane) {
                        inLane = true;
                        currentLaneStart = x;
                    }
                } else {
                    if (inLane) {
                        inLane = false;
                        // 極端に細いノイズはレーンとして除外
                        if (x - currentLaneStart > 10) {
                            lanes.push({ start: currentLaneStart, end: x });
                        }
                    }
                }
            }
            // 最後のレーンを閉じる
            if (inLane && w - currentLaneStart > 10) {
                lanes.push({ start: currentLaneStart, end: w - 1 });
            }

            // キャンバス上にレーンの境界線を描画
            ctx.strokeStyle = 'red';
            ctx.lineWidth = 2;
            lanes.forEach(lane => {
                ctx.strokeRect(lane.start, 0, lane.end - lane.start, h);
            });

            // 結果表示コンテナをリセットして表示
            laneCharts.innerHTML = '';
            resultsContainer.classList.remove('hidden');
            resultsContainer.classList.add('flex');

            // 各レーンの縦方向プロファイルを計算してグラフを描画
            lanes.forEach((lane, index) => {
                const laneW = lane.end - lane.start;
                const rowSums = new Array(h).fill(0);

                for (let y = 0; y < h; y++) {
                    for (let x = lane.start; x <= lane.end; x++) {
                        let i = (y * w + x) * 4;
                        let brightness = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                        let val = isBgBright ? (255 - brightness) : brightness;
                        rowSums[y] += val;
                    }
                }

                // グラフ用キャンバスの生成
                const chartWrapper = document.createElement('div');
                chartWrapper.className = 'bg-slate-900 p-3 rounded-lg border border-slate-700';
                
                const chartTitle = document.createElement('h3');
                chartTitle.className = 'text-sm font-bold text-slate-300 mb-2';
                chartTitle.innerText = `レーン ${index + 1}`;
                
                const chartCanvas = document.createElement('canvas');
                chartCanvas.className = 'chart-canvas';
                chartCanvas.width = 400;
                chartCanvas.height = 120;
                
                chartWrapper.appendChild(chartTitle);
                chartWrapper.appendChild(chartCanvas);
                laneCharts.appendChild(chartWrapper);

                // グラフの描画
                const cCtx = chartCanvas.getContext('2d');
                const maxRowSum = Math.max(...rowSums) || 1; // ゼロ除算防止
                
                cCtx.clearRect(0, 0, chartCanvas.width, chartCanvas.height);
                cCtx.beginPath();
                cCtx.strokeStyle = '#34d399'; // Tailwind emerald-400
                cCtx.lineWidth = 2;
                
                for (let y = 0; y < h; y++) {
                    // Y軸(流れる方向)をグラフのX軸に、強度をY軸にする
                    const cx = (y / h) * chartCanvas.width;
                    const cy = chartCanvas.height - ((rowSums[y] / maxRowSum) * chartCanvas.height);
                    
                    if (y === 0) cCtx.moveTo(cx, cy);
                    else cCtx.lineTo(cx, cy);
                }
                cCtx.stroke();
                
                // 塗りつぶし
                cCtx.lineTo(chartCanvas.width, chartCanvas.height);
                cCtx.lineTo(0, chartCanvas.height);
                cCtx.fillStyle = 'rgba(52, 211, 153, 0.2)';
                cCtx.fill();
            });
            
            // 少しスクロールして結果を見せる
            resultsContainer.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
