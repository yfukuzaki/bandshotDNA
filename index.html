<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNAゲル撮影プロトタイプ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        video {
            display: block !important;
            opacity: 1 !important;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #000;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-gray-900 text-white p-4">

    <h1 class="text-xl font-bold mb-4">DNAゲル撮影カメラ</h1>
    <div id="status" class="mb-4 text-yellow-400 font-bold p-2 bg-gray-800 rounded">画面をタップしてカメラ起動</div>
    
    <div class="relative w-full max-w-sm aspect-[3/4] bg-black border-4 border-gray-600 rounded-lg overflow-hidden">
        <video id="video" autoplay playsinline webkit-playsinline muted class="w-full h-full"></video>
    </div>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        let currentStream = null;

        async function startCamera() {
            try {
                status.innerText = "カメラ起動中...";
                
                const constraints = {
                    video: {
                        facingMode: { ideal: "environment" }
                    }
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    video.play().catch(e => console.error("Play error:", e));
                };

                video.oncanplay = () => {
                    video.play().catch(e => console.error("Play error oncanplay:", e));
                    status.innerText = "リアカメラ起動成功！描画中...";
                    status.classList.replace('text-yellow-400', 'text-green-400');
                };

            } catch (err) {
                console.error(err);
                status.innerText = "エラー: " + err.name;
                status.classList.replace('text-yellow-400', 'text-red-400');
            }
        }

        document.body.addEventListener('click', () => {
            startCamera();
        }, { once: true });
    </script>
</body>
</html>
