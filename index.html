<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNAゲル撮影アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-gray-900 text-white p-4">
    
    <h1 class="text-lg font-bold mb-4">リアカメラ起動テスト</h1>
    
    <div id="status" class="mb-4 text-yellow-400 font-bold">起動準備中...</div>
    
    <!-- 映像表示用のvideo要素 -->
    <video id="video" autoplay playsinline class="w-full max-w-md bg-black border-4 border-gray-600 rounded-lg"></video>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');

        async function startCamera() {
            try {
                // 制限を緩和したカメラ要求
                // exactを外し、idealでリアカメラを指定
                const constraints = {
                    video: {
                        facingMode: { ideal: "environment" },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                video.srcObject = stream;
                status.innerText = "カメラ起動成功！映像を待機中...";

                // 再生処理
                video.onloadedmetadata = () => {
                    video.play().then(() => {
                        status.innerText = "リアカメラ起動成功！";
                    }).catch(e => {
                        status.innerText = "再生エラー: " + e.message;
                    });
                };
            } catch (err) {
                // OverconstrainedErrorなどが発生した際のフォールバック
                status.innerText = "エラー: " + err.name + " - " + err.message;
                console.error(err);
            }
        }

        window.onload = startCamera;
    </script>
</body>
</html>
