<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNAゲル撮影アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col items-center justify-center min-h-screen bg-gray-900 text-white p-4">
    
    <h1 class="text-xl font-bold mb-2">DNAゲル撮影カメラ</h1>
    <div id="status" class="mb-4 text-yellow-400 font-bold">画面をタップしてカメラ起動</div>
    
    <!-- 常にアクティブに保つため、最小サイズではなくしっかり表示させる -->
    <div id="camera-container" class="relative w-full max-w-sm aspect-[3/4] bg-black border-4 border-gray-600 rounded-lg overflow-hidden">
        <video id="video" autoplay playsinline muted class="w-full h-full object-cover"></video>
    </div>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');

        async function initCamera() {
            try {
                // 既存のストリームがあれば停止させる
                if (video.srcObject) {
                    video.srcObject.getTracks().forEach(track => track.stop());
                }

                const constraints = {
                    video: {
                        facingMode: { ideal: "environment" },
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                // 再生を確実にするためのイベントハンドラ
                video.onloadedmetadata = () => {
                    video.play().then(() => {
                        status.innerText = "リアカメラ起動中...";
                    }).catch(err => {
                        status.innerText = "再生エラー: " + err.message;
                    });
                };
            } catch (err) {
                status.innerText = "エラー: " + err.name;
                console.error(err);
            }
        }

        // ユーザーインタラクションで確実に起動
        document.body.addEventListener('click', () => {
            initCamera();
        }, { once: true });
    </script>
</body>
</html>
